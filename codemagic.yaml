workflows:
  ios-release:
    name: SereinApp iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Serein ASC

    environment:
      vars:
        XCODE_PROJECT: "app/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "fr.sereinapp.app"
      node: latest

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Remove audio from iOS bundle (servi via CDN)
        script: find app/ios/App/App/public/assets/audio -name "*.mp3" -delete || true

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch certificate and create provisioning profile
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificate to keychain
        script: keychain add-certificates

      - name: Apply code signing to Xcode project
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --configuration Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - builds@sereinapp.fr
