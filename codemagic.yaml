workflows:
  ios-release:
    name: SereinApp iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Serein ASC

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: fr.sereinapp.app
      vars:
        XCODE_PROJECT: "app/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        # Apple ID numérique de Serein Méditation (App Store : .../id6780955764)
        APP_APPLE_ID: "6780955764"
      node: latest
      # Build contre le SDK le plus récent (rendu Liquid Glass + conformité
      # "compiler avec le dernier SDK" exigée par Apple pour iOS 26/27).
      # Pour des builds 100 % reproductibles, remplacer "latest" par une
      # version figée (ex. "26.0") une fois confirmée disponible sur Codemagic.
      xcode: latest

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Remove audio from iOS bundle (servi via CDN)
        script: find app/ios/App/App/public/assets/audio -name "*.mp3" -delete || true

      - name: Auto-incrémente le build number (dernier TestFlight + 1)
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_APPLE_ID")
          if [ -z "$LATEST" ]; then
            echo "⚠️  Build number introuvable — vérifie APP_APPLE_ID et l'intégration App Store Connect."
            exit 1
          fi
          NEW=$((LATEST + 1))
          echo "Dernier build TestFlight : $LATEST → nouveau : $NEW"
          cd "$CM_BUILD_DIR/app/ios/App"
          agvtool new-version -all "$NEW"

      - name: Apply code signing to Xcode project
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - builds@sereinapp.fr

  # ─────────────────────────────────────────────────────────────────────────
  # Build Android automatisé (équivalent de l'iOS ci-dessus).
  # Prérequis à configurer UNE FOIS dans Codemagic :
  #   1. Code signing identities ▸ uploader le keystore Android sous la
  #      référence "serein_keystore" (le même que keystore.properties local).
  #   2. Environment variables ▸ groupe "google_play" contenant
  #      GCLOUD_SERVICE_ACCOUNT_CREDENTIALS (JSON du compte de service Play,
  #      avec accès à l'API Google Play Developer).
  # ─────────────────────────────────────────────────────────────────────────
  android-release:
    name: SereinApp Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - serein_keystore
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "fr.sereinapp.app"
      node: latest

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Capacitor sync Android
        script: npx cap sync android

      - name: Reconstruit keystore.properties depuis le keystore Codemagic
        script: |
          printf 'storeFile=%s\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$CM_KEYSTORE_PATH" "$CM_KEYSTORE_PASSWORD" "$CM_KEY_ALIAS" "$CM_KEY_PASSWORD" \
            > "$CM_BUILD_DIR/app/android/keystore.properties"

      - name: Auto-incrémente le versionCode (dernier build Play + 1)
        script: |
          LATEST=$(google-play get-latest-build-number --package-name "$PACKAGE_NAME")
          if [ -z "$LATEST" ]; then
            echo "⚠️  versionCode introuvable sur Play — vérifie PACKAGE_NAME et GCLOUD_SERVICE_ACCOUNT_CREDENTIALS."
            exit 1
          fi
          NEW=$((LATEST + 1))
          echo "Dernier versionCode Play : $LATEST → nouveau : $NEW"
          sed -i "s/versionCode [0-9]\+/versionCode $NEW/" "$CM_BUILD_DIR/app/android/app/build.gradle"

      - name: Build release AAB
        script: |
          cd "$CM_BUILD_DIR/app/android"
          ./gradlew bundleRelease

    artifacts:
      - app/android/**/outputs/**/*.aab
      - app/android/**/outputs/**/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
      email:
        recipients:
          - builds@sereinapp.fr
