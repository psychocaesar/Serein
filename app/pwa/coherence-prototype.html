<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cohérence cardiaque — Prototype Serein</title>
  <style>
    :root {
      --color-bg: #f0f5f3;
      --color-surface: #ffffff;
      --color-primary: #2f6f5e;
      --color-primary-light: #e0eeea;
      --color-text: #15332b;
      --color-muted: #5a7a72;
      --color-border: rgba(0,0,0,.08);
      --radius: 1.25rem;
      --radius-sm: .75rem;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* ── Carte d'entrée ── */
    .card-entry {
      background: var(--color-surface);
      border-radius: var(--radius);
      border: 1px solid var(--color-border);
      padding: 1.5rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: .1em;
      font-size: .75rem;
      color: var(--color-muted);
      margin-bottom: .5rem;
    }

    .card-entry h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: .4rem;
    }

    .card-entry p {
      font-size: .9rem;
      color: var(--color-muted);
      line-height: 1.55;
      margin-bottom: 1.5rem;
    }

    /* Sélecteur type de séance */
    .session-type-list {
      display: flex;
      flex-direction: column;
      gap: .6rem;
      margin-bottom: 1.25rem;
    }

    .session-type-btn {
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .85rem 1rem;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-bg);
      cursor: pointer;
      transition: all .18s;
      text-align: left;
      width: 100%;
    }

    .session-type-btn:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-light);
    }

    .session-type-btn.active {
      border-color: var(--color-primary);
      background: var(--color-primary-light);
    }

    .session-type-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--color-border);
      flex-shrink: 0;
      transition: all .18s;
    }

    .session-type-btn.active .session-type-dot {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }

    .session-type-info { flex: 1; }

    .session-type-name {
      font-size: .9rem;
      font-weight: 600;
      color: var(--color-text);
    }

    .session-type-desc {
      font-size: .78rem;
      color: var(--color-muted);
      margin-top: .1rem;
    }

    .session-type-badge {
      font-size: .72rem;
      font-weight: 600;
      background: var(--color-primary);
      color: #fff;
      border-radius: 999px;
      padding: .2rem .55rem;
      flex-shrink: 0;
    }

    /* Sélecteur durée */
    .duration-row {
      display: flex;
      gap: .5rem;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .duration-btn {
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      border-radius: 999px;
      padding: .45rem 1rem;
      font-size: .85rem;
      cursor: pointer;
      transition: all .18s;
      color: var(--color-text);
    }

    .duration-btn.active {
      background: var(--color-primary);
      color: #fff;
      border-color: transparent;
    }

    .btn-start {
      width: 100%;
      padding: .95rem;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }

    .btn-start:hover { opacity: .9; }

    /* ── Écran de session ── */
    .screen-session {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 380px;
      min-height: 520px;
      text-align: center;
    }

    .session-top { width: 100%; }

    .session-label {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--color-muted);
      margin-bottom: .25rem;
    }

    .session-phase {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--color-text);
      min-height: 2rem;
      transition: opacity .3s;
    }

    /* Animation cercle */
    .breath-container {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 1.5rem auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 3 anneaux concentriques */
    .breath-ring {
      position: absolute;
      border-radius: 50%;
      animation: none;
    }

    .breath-ring-1 {
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(47,111,94,.35), rgba(47,111,94,.1));
    }
    .breath-ring-2 {
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(47,111,94,.2), rgba(47,111,94,.04));
    }
    .breath-ring-3 {
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(47,111,94,.1), transparent);
    }

    .breath-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3d8a75, var(--color-primary));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
      position: relative;
      z-index: 1;
      box-shadow:
        0 0 0 0 rgba(47,111,94,0),
        0 12px 40px rgba(47,111,94,.4);
      transition: box-shadow .5s ease;
    }

    .breath-circle.inhaling {
      box-shadow:
        0 0 60px 20px rgba(47,111,94,.15),
        0 12px 40px rgba(47,111,94,.4);
    }

    @keyframes ring-inhale-1 {
      from { transform: scale(1);    opacity: 1; }
      to   { transform: scale(2);    opacity: 0; }
    }
    @keyframes ring-inhale-2 {
      from { transform: scale(1);    opacity: 1; }
      to   { transform: scale(2.5);  opacity: 0; }
    }
    @keyframes ring-inhale-3 {
      from { transform: scale(1);    opacity: 1; }
      to   { transform: scale(3.2);  opacity: 0; }
    }

    @keyframes ring-exhale-1 {
      from { transform: scale(2);    opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    @keyframes ring-exhale-2 {
      from { transform: scale(2.5);  opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    @keyframes ring-exhale-3 {
      from { transform: scale(3.2);  opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    @keyframes circle-inhale {
      from { transform: scale(1); }
      to   { transform: scale(1.45); }
    }
    @keyframes circle-exhale {
      from { transform: scale(1.45); }
      to   { transform: scale(1); }
    }

    .breath-ring-1.inhaling { animation: ring-inhale-1 var(--phase-dur, 5s) ease-in-out forwards; }
    .breath-ring-2.inhaling { animation: ring-inhale-2 var(--phase-dur, 5s) ease-in-out forwards; animation-delay: .3s; }
    .breath-ring-3.inhaling { animation: ring-inhale-3 var(--phase-dur, 5s) ease-in-out forwards; animation-delay: .6s; }

    .breath-ring-1.exhaling { animation: ring-exhale-1 var(--phase-dur, 5s) ease-in-out forwards; }
    .breath-ring-2.exhaling { animation: ring-exhale-2 var(--phase-dur, 5s) ease-in-out forwards; animation-delay: .3s; }
    .breath-ring-3.exhaling { animation: ring-exhale-3 var(--phase-dur, 5s) ease-in-out forwards; animation-delay: .6s; }

    .breath-circle.inhaling  { animation: circle-inhale var(--phase-dur, 5s) ease-in-out forwards; }
    .breath-circle.exhaling  { animation: circle-exhale var(--phase-dur, 5s) ease-in-out forwards; }

    /* Progression + cycles */
    .session-bottom { width: 100%; }

    .progress-bar-wrap {
      background: var(--color-primary-light);
      border-radius: 999px;
      height: 4px;
      width: 100%;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--color-primary);
      border-radius: 999px;
      width: 0%;
      transition: width .5s linear;
    }

    .session-stats {
      display: flex;
      justify-content: space-between;
      font-size: .82rem;
      color: var(--color-muted);
      margin-bottom: 1.5rem;
    }

    .btn-stop {
      width: 100%;
      padding: .85rem;
      background: transparent;
      color: var(--color-muted);
      border: 1px solid var(--color-border);
      border-radius: 999px;
      font-size: .9rem;
      cursor: pointer;
      transition: all .18s;
    }

    .btn-stop:hover {
      background: var(--color-bg);
    }

    /* ── Écran fin ── */
    .screen-end {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 380px;
      text-align: center;
      gap: 1rem;
    }

    .end-emoji { font-size: 3rem; margin-bottom: .5rem; }

    .end-title {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .end-sub {
      font-size: .95rem;
      color: var(--color-muted);
      line-height: 1.6;
    }

    .end-stat {
      background: var(--color-primary-light);
      color: var(--color-primary);
      border-radius: 999px;
      padding: .4rem 1.1rem;
      font-size: .85rem;
      font-weight: 600;
    }

    .btn-again {
      width: 100%;
      padding: .95rem;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
    }
  </style>
</head>
<body>

  <!-- ── Écran d'entrée ── -->
  <div class="card-entry" id="screenEntry">
    <p class="eyebrow">Cohérence cardiaque</p>
    <h2>Calme ton rythme cardiaque</h2>
    <p>Choisis un rythme, puis une durée.</p>

    <div class="session-type-list">
      <button class="session-type-btn" data-inhale="3" data-exhale="5">
        <div class="session-type-dot"></div>
        <div class="session-type-info">
          <div class="session-type-name">Débuter</div>
          <div class="session-type-desc">Inspire 3 sec · Expire 5 sec — pour commencer en douceur</div>
        </div>
      </button>

      <button class="session-type-btn active" data-inhale="5" data-exhale="5">
        <div class="session-type-dot"></div>
        <div class="session-type-info">
          <div class="session-type-name">Cohérence cardiaque</div>
          <div class="session-type-desc">Inspire 5 sec · Expire 5 sec — le rythme idéal</div>
        </div>
        <span class="session-type-badge">Recommandé</span>
      </button>

      <button class="session-type-btn" data-inhale="4" data-exhale="8">
        <div class="session-type-dot"></div>
        <div class="session-type-info">
          <div class="session-type-name">Apaiser</div>
          <div class="session-type-desc">Inspire 4 sec · Expire 8 sec — pour relâcher profondément</div>
        </div>
      </button>
    </div>

    <div class="duration-row">
      <button class="duration-btn" data-min="3">3 min</button>
      <button class="duration-btn active" data-min="5">5 min</button>
      <button class="duration-btn" data-min="10">10 min</button>
    </div>

    <button class="btn-start" id="btnStart">Commencer</button>
  </div>

  <!-- ── Écran de session ── -->
  <div class="screen-session" id="screenSession">
    <div class="session-top">
      <p class="session-label">Cohérence cardiaque</p>
      <p class="session-phase" id="phaseLabel">Inspire…</p>
    </div>

    <div class="breath-container">
      <div class="breath-ring breath-ring-1" id="breathRing1"></div>
      <div class="breath-ring breath-ring-2" id="breathRing2"></div>
      <div class="breath-ring breath-ring-3" id="breathRing3"></div>
      <div class="breath-circle" id="breathCircle">5</div>
    </div>

    <div class="session-bottom">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="session-stats">
        <span id="statCycles">0 cycle</span>
        <span id="statTime">0:00 / 5:00</span>
      </div>
      <button class="btn-stop" id="btnStop">Arrêter</button>
    </div>
  </div>

  <!-- ── Écran fin ── -->
  <div class="screen-end" id="screenEnd">
    <div class="end-emoji">🌿</div>
    <p class="end-title">Séance terminée</p>
    <p class="end-sub">Tu viens de réguler ton système nerveux.<br>Prends un instant avant de reprendre.</p>
    <span class="end-stat" id="endStat">30 cycles · 5 min</span>
    <button class="btn-again" id="btnAgain">Refaire une séance</button>
  </div>

  <script>
    // ── Config ──
    let inhaleS    = 5;
    let exhaleS    = 5;
    let durationMin  = 5;
    let totalSeconds = 0;
    let elapsed      = 0;
    let cycles       = 0;
    let phase        = 'inhale'; // 'inhale' | 'exhale'
    let phaseElapsed = 0;
    let ticker       = null;

    // ── Sélecteur type de séance ──
    document.querySelectorAll('.session-type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.session-type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        inhaleS = parseInt(btn.dataset.inhale);
        exhaleS = parseInt(btn.dataset.exhale);
      });
    });

    // ── Sélecteur durée ──
    document.querySelectorAll('.duration-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        durationMin = parseInt(btn.dataset.min);
      });
    });

    // ── Démarrer ──
    document.getElementById('btnStart').addEventListener('click', startSession);
    document.getElementById('btnAgain').addEventListener('click', () => {
      showScreen('entry');
    });
    document.getElementById('btnStop').addEventListener('click', endSession);

    function showScreen(name) {
      document.getElementById('screenEntry').style.display   = name === 'entry'   ? 'block' : 'none';
      document.getElementById('screenSession').style.display = name === 'session' ? 'flex'  : 'none';
      document.getElementById('screenEnd').style.display     = name === 'end'     ? 'flex'  : 'none';
    }

    function startSession() {
      totalSeconds = durationMin * 60;
      elapsed      = 0;
      cycles       = 0;
      phase        = 'inhale';
      phaseElapsed = 0;

      showScreen('session');
      updatePhaseUI();
      ticker = setInterval(tick, 1000);
    }

    function tick() {
      elapsed++;
      phaseElapsed++;

      // Compte à rebours dans le cercle
      const phaseDur = phase === 'inhale' ? inhaleS : exhaleS;
      const remaining = phaseDur - phaseElapsed;
      document.getElementById('breathCircle').textContent = Math.max(0, remaining);

      // Changement de phase
      if (phaseElapsed >= phaseDur) {
        phaseElapsed = 0;
        if (phase === 'inhale') {
          phase = 'exhale';
        } else {
          phase = 'inhale';
          cycles++;
        }
        updatePhaseUI();
      }


      // Progression globale
      const pct = (elapsed / totalSeconds) * 100;
      document.getElementById('progressFill').style.width = pct + '%';

      // Stats
      const mm = Math.floor(elapsed / 60);
      const ss = String(elapsed % 60).padStart(2, '0');
      const tm = Math.floor(totalSeconds / 60);
      const ts = String(totalSeconds % 60).padStart(2, '0');
      document.getElementById('statTime').textContent   = `${mm}:${ss} / ${tm}:${ts}`;
      document.getElementById('statCycles').textContent = `${cycles} cycle${cycles > 1 ? 's' : ''}`;

      // Fin
      if (elapsed >= totalSeconds) endSession();
    }

    function updatePhaseUI() {
      const label    = document.getElementById('phaseLabel');
      const circle   = document.getElementById('breathCircle');
      const rings    = [
        document.getElementById('breathRing1'),
        document.getElementById('breathRing2'),
        document.getElementById('breathRing3'),
      ];
      const phaseDur   = phase === 'inhale' ? inhaleS : exhaleS;
      const phaseClass = phase === 'inhale' ? 'inhaling' : 'exhaling';

      label.textContent = phase === 'inhale' ? 'Inspire…' : 'Expire…';
      circle.textContent = phaseDur;

      // Reset et relance animations
      const dur = phaseDur + 's';
      rings.forEach((r, i) => {
        r.style.setProperty('--phase-dur', dur);
        r.className = `breath-ring breath-ring-${i + 1}`;
        void r.offsetWidth;
        r.classList.add(phaseClass);
      });

      circle.style.setProperty('--phase-dur', dur);
      circle.className = 'breath-circle';
      void circle.offsetWidth;
      circle.classList.add(phaseClass);
    }

    function endSession() {
      clearInterval(ticker);
      ticker = null;

      const mm = Math.floor(elapsed / 60);
      const ss = String(elapsed % 60).padStart(2, '0');
      document.getElementById('endStat').textContent = `${cycles} cycle${cycles > 1 ? 's' : ''} · ${mm}:${ss}`;

      showScreen('end');
    }

    // Init
    showScreen('entry');
  </script>
</body>
</html>
