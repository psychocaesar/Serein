server {
    server_name sereinapp.fr www.sereinapp.fr;

    include snippets/serein-security-headers.conf;

    # ── Assets immuables (ne changent jamais — fingerprint dans le nom) ──
    location ~* \.(mp3|ogg|webp|jpg|jpeg|png|svg|ico|woff2|woff)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include snippets/serein-security-headers.conf;
        access_log off;
    }

    # ── JS et CSS : cache court avec revalidation ETag ──
    location ~* \.(js|css)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        include snippets/serein-security-headers.conf;
    }

    # ── HTML : jamais en cache ──
    location ~* \.html$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include snippets/serein-security-headers.conf;
    }

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # ── Tout le reste ──
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/cesarbroche.fr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cesarbroche.fr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;


}
