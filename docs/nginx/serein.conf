## ──────────────────────────────────────────────────────────────────
## sereinapp.fr — landing statique (bascule post-validation stores)
## Remplace la config PWA (proxy port 3001) — juin 2026
## ──────────────────────────────────────────────────────────────────

## HTTP (apex + www) → HTTPS redirect
server {
    listen 80;
    server_name sereinapp.fr www.sereinapp.fr;
    return 301 https://sereinapp.fr$request_uri;
}

## HTTPS apex www → apex canonique
server {
    listen 443 ssl http2;
    server_name www.sereinapp.fr;

    ssl_certificate /etc/letsencrypt/live/cesarbroche.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cesarbroche.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://sereinapp.fr$request_uri;
}

## HTTPS apex + contenu statique
server {
    listen 443 ssl http2;
    server_name sereinapp.fr;

    root /home/pi/sereinapp-landing;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/cesarbroche.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cesarbroche.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include snippets/serein-security-headers.conf;

    # ── sw.js kill-switch : jamais en cache pour être récupéré immédiatement ──
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include snippets/serein-security-headers.conf;
    }

    # ── HTML : jamais en cache ──
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include snippets/serein-security-headers.conf;
    }

    # ── JS et CSS : cache court avec revalidation ──
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        include snippets/serein-security-headers.conf;
    }

    # ── Assets immuables (polices, images — pas de fingerprint dans le nom mais stables) ──
    location ~* \.(webp|jpg|jpeg|png|svg|ico|woff2|woff)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include snippets/serein-security-headers.conf;
        access_log off;
    }

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml text/html;
    gzip_min_length 1024;

    # ── Pages : 404 sur ressource inconnue, pas de fallback index ──
    location / {
        try_files $uri $uri/ =404;
    }
}
