server {
    listen 80;
    server_name questionnaires.cesarbroche.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name questionnaires.cesarbroche.fr;

    ssl_certificate     /etc/letsencrypt/live/questionnaires.cesarbroche.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/questionnaires.cesarbroche.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Sécurité
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
